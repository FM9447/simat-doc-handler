name: antigravity
description: "A digital student document approval system."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  syncfusion_flutter_pdfviewer: ^33.1.44
  signature: ^5.4.0
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  lottie: ^3.1.2
  pdf: ^3.11.1
  printing: ^5.13.3
  path_provider: ^2.1.3
  shared_preferences: ^2.3.2
  connectivity_plus: ^6.1.0
  flutter_secure_storage: ^9.2.2
  intl: ^0.19.0
  shimmer: ^3.0.0
  confetti: ^0.7.0
  flutter_speed_dial: ^7.0.0
  url_launcher: ^6.3.2
  google_fonts: ^6.2.1
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.1
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
