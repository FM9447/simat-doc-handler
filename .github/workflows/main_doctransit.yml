name: Deploy DocTransit Web to GitHub Pages

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'flutter_app/**'
      - '.github/workflows/main_doctransit.yml'

# Force Node 24 to suppress deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Permissions required for official GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get
        working-directory: flutter_app

      - name: Run Code Generation
        run: flutter pub run build_runner build --delete-conflicting-outputs
        working-directory: flutter_app

      - name: Build Web
        # Added --base-href / to ensure correct routing at root domain
        run: flutter build web --release --base-href /
        working-directory: flutter_app

      - name: Add CNAME
        run: echo "doctransit.live" > build/web/CNAME
        working-directory: flutter_app

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./flutter_app/build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
