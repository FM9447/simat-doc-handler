name: Deploy DocTransit Web to GitHub Pages

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'flutter_app/**'
      - '.github/workflows/main_doctransit.yml'

# Suppress Node.js deprecation warnings by using Node 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6 # Latest v6 for full Node 24 compatibility

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.1'
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get
        working-directory: flutter_app

      - name: Build Web
        run: flutter build web --release
        working-directory: flutter_app

      - name: Add CNAME
        run: echo "doctransit.live" > build/web/CNAME
        working-directory: flutter_app

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4 # Optimized for the latest runners
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./flutter_app/build/web
